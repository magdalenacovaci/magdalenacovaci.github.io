<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chimie Anorganică – Documente</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --ink: #1a1a2e;
      --accent: #1d3557;
      --accent-light: #e8eef4;
      --card-bg: #fffef9;
      --border: #d4cfc4;
      --pdf-color: #c0392b;
      --doc-color: #2980b9;
      --ppt-color: #d35400;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Back link ── */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
      margin-bottom: 2.5rem;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    /* ── Header ── */
    header { margin-bottom: 2.8rem; }
    header .label {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }
    header .divider {
      width: 50px; height: 2px;
      background: var(--accent);
      margin-top: 1rem;
    }

    /* ── Section title ── */
    .section-title {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
      color: #999;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── File grid ── */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    /* ── File card ── */
    .file-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.4rem 1.2rem 1.2rem;
      text-decoration: none;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      box-shadow: 2px 2px 0 var(--border);
    }
    .file-card:hover {
      transform: translateY(-3px);
      box-shadow: 3px 7px 18px rgba(0,0,0,0.09);
    }

    /* coloured top bar by type */
    .file-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .file-card.pdf::before  { background: var(--pdf-color); }
    .file-card.doc::before  { background: var(--doc-color); }
    .file-card.ppt::before  { background: var(--ppt-color); }

    .file-icon {
      font-size: 1.8rem;
      line-height: 1;
    }

    .file-type-badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
      align-self: flex-start;
    }
    .file-card.pdf .file-type-badge  { background: #fdecea; color: var(--pdf-color); }
    .file-card.doc .file-type-badge  { background: #e8f4fb; color: var(--doc-color); }
    .file-card.ppt .file-type-badge  { background: #fdf0e8; color: var(--ppt-color); }

    .file-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
    }

    .file-desc {
      font-size: 0.82rem;
      color: #777;
      line-height: 1.5;
    }

    .file-download {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: gap 0.2s;
    }
    .file-card:hover .file-download { gap: 0.55rem; }

    /* ── Empty state helper ── */
    .empty {
      color: #bbb;
      font-size: 0.88rem;
      font-style: italic;
      padding: 0.5rem 0;
    }
  </style>
</head>
<body>
<div class="container">

  <a class="back" href="../">← Înapoi</a>

</body>
</html>
