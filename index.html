<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chimie - Covaci Magdalena</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --ink: #1a1a2e;
      --accent-1: #2d6a4f;   /* organic green */
      --accent-2: #1d3557;   /* inorganic navy */
      --card-bg: #fffef9;
      --border: #d4cfc4;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
      position: relative;
    }

    header .label {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.6rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
    }

    header .divider {
      width: 60px;
      height: 2px;
      background: var(--ink);
      margin: 1.2rem auto 0;
    }

    .cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 260px;
      padding: 2.4rem 2rem;
      text-decoration: none;
      color: var(--ink);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 2px 2px 0 var(--border);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      transition: width 0.3s ease;
    }

    .card.inorganic::before { background: var(--accent-2); }
    .card.organic::before   { background: var(--accent-1); }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 4px 8px 20px rgba(0,0,0,0.10);
    }

    .card:hover::before { width: 6px; }

    .card .icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      display: block;
    }

    .card .category {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .card.inorganic .category { color: var(--accent-2); }
    .card.organic   .category { color: var(--accent-1); }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .card p {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.6;
    }

    .card .arrow {
      display: inline-block;
      margin-top: 1.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: transform 0.2s ease;
    }

    .card.inorganic .arrow { color: var(--accent-2); }
    .card.organic   .arrow { color: var(--accent-1); }

    .card:hover .arrow { transform: translateX(5px); }

    footer {
      margin-top: 4rem;
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <h1>Chimie</h1>
    <div class="divider"></div>
  </header>

  <div class="cards">
    <a class="card inorganic" href="ChimieAnorganica/index.html">
      <span class="icon">⚗️</span>
      <h2>Chimie Anorganică</h2>
      <span class="arrow">Deschide →</span>
    </a>

    <a class="card organic" href="ChimieOrganica/index.html">
      <span class="icon">🧬</span>
      <h2>Chimie Organică</h2>
      <span class="arrow">Deschide →</span>
    </a>
  </div>

  <footer>© 2026 · Chimie - Prof. Covaci Magdalena</footer>
  <footer>Colegiul Național ,,Vasile Lucaciu" Baia Mare</footer>

</body>
</html>
